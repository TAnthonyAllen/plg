name: plg
options:
  bundleIdPrefix: com.taa.plg
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "12.0"

# .C is the tawk-emitted C++ extension. xcodegen would otherwise classify
# it as a Resource — force it to compile as C++.
fileTypes:
  C:
    buildPhase: sources
    lastKnownFileType: sourcecode.cpp.cpp

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
    CLANG_CXX_LIBRARY: "libc++"
    GCC_C_LANGUAGE_STANDARD: "gnu11"

# Three navigator groups: Sources (.C), Headers (.h), TAWK (.twk).
# Each preserves the dir-of-origin as a sub-group.
targets:
  plg:
    type: tool
    platform: macOS
    sources:
      # ── Sources (.C) ─────────────────────────────────────────────────
      - path: .
        group: Sources/plg
        buildPhase: sources
        includes: ["*.C"]
      - path: ../PLGset.C
        group: Sources/plg
        buildPhase: sources
      - path: ../../../support/Frame
        group: Sources/Frame
        buildPhase: sources
        includes: ["*.C"]
        excludes: ["BeforeRefactor"]
      - path: ../../../support/Maps
        group: Sources/Maps
        buildPhase: sources
        includes: ["*.C"]
      - path: ../../../support/KeyTable
        group: Sources/KeyTable
        buildPhase: sources
        includes: ["*.C"]

      # ── Headers (.h) ─────────────────────────────────────────────────
      - path: .
        group: Headers/plg
        buildPhase: none
        includes: ["*.h"]
      - path: ../PLGset.h
        group: Headers/plg
        buildPhase: none
      - path: ../../../support/Frame
        group: Headers/Frame
        buildPhase: none
        includes: ["*.h"]
        excludes: ["BeforeRefactor"]
      - path: ../../../support/Maps
        group: Headers/Maps
        buildPhase: none
        includes: ["*.h"]
      - path: ../../../support/KeyTable
        group: Headers/KeyTable
        buildPhase: none
        includes: ["*.h"]

      # ── TAWK source (.twk + PLGrevision) ─────────────────────────────
      - path: .
        group: TAWK/plg
        buildPhase: none
        includes: ["*.twk", "PLGrevision"]
      - path: ../PLGset.twk
        group: TAWK/plg
        buildPhase: none
      - path: ../../../support/Frame
        group: TAWK/Frame
        buildPhase: none
        includes: ["*.twk"]
        excludes: ["BeforeRefactor"]
      - path: ../../../support/Maps
        group: TAWK/Maps
        buildPhase: none
        includes: ["*.twk"]
      - path: ../../../support/KeyTable
        group: TAWK/KeyTable
        buildPhase: none
        includes: ["*.twk"]

    settings:
      base:
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)"
          - "$(SRCROOT)/.."
          - "$(SRCROOT)/../../../support/Frame"
          - "$(SRCROOT)/../../../support/Maps"
          - "$(SRCROOT)/../../../support/KeyTable"
          - "$(SRCROOT)/../../../support/Include"
        WARNING_CFLAGS:
          - "-Wno-parentheses"
          - "-Wno-write-strings"
        OTHER_CFLAGS:
          - "-Wno-parentheses"
          - "-Wno-write-strings"
