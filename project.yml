name: plg
options:
  bundleIdPrefix: com.taa.plg
  deploymentTarget:
    macOS: "12.0"

# .C is the tawk-emitted C++ extension. xcodegen would otherwise classify
# it as a Resource — force it to compile as C++.
fileTypes:
  C:
    buildPhase: sources
    lastKnownFileType: sourcecode.cpp.cpp

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
    CLANG_CXX_LIBRARY: "libc++"
    GCC_C_LANGUAGE_STANDARD: "gnu11"

# Pull in the support project so we can depend on (and link against) its
# static library target. The Support/ browse group below is navigation
# only — the actual link comes from this projectReferences + the
# target's dependencies entry.
projectReferences:
  Support:
    path: ../../../support/support.xcodeproj

targets:
  plg:
    type: tool
    platform: macOS
    dependencies:
      - target: Support/support
    sources:
      # ── PLG own — C++ (compiled) ───────────────────────────────────
      - path: .
        group: PLG/C++
        buildPhase: sources
        includes: ["*.C"]

      # ── PLG own — headers (browse) ─────────────────────────────────
      - path: .
        group: PLG/C++
        buildPhase: none
        includes: ["*.h"]

      # ── PLG own — Tawk source (browse) ─────────────────────────────
      - path: .
        group: PLG/Tawk
        buildPhase: none
        includes: ["*.twk", "plgDirectives"]

      # ── PLG own — plgDirectives lives one level up ─────────────────
      - path: ../plgDirectives
        group: PLG/Tawk
        buildPhase: none
        optional: true

      # ── Tok (TAWK transpiler — browse only) ────────────────────────
      - path: ../../Tokf
        group: Tok/C++
        buildPhase: none
        includes: ["*.C"]
        optional: true
      - path: ../../Tokf
        group: Tok/Tawk
        buildPhase: none
        includes: ["*.twk", "Expression.h"]
        excludes: ["Expression.twk"]
        optional: true
      - path: ../../Tokf
        group: Tok/Grammer
        buildPhase: none
        includes: ["*.g"]
        optional: true

      # ── Incant (Groups source — browse only) ───────────────────────
      - path: ../../Groups
        group: Incant/C++
        buildPhase: none
        includes: ["*.mm"]
        optional: true
      - path: ../../Groups
        group: Incant/Tawk
        buildPhase: none
        includes:
          - "GroupBody.twk"
          - "GroupControl.twk"
          - "GroupDraw.twk"
          - "GroupItem.twk"
          - "GroupList.twk"
          - "GroupMain.twk"
          - "GroupRules.twk"
          - "groups.twk"
          - "GroupStak.twk"
          - "Layout.twk"
          - "RuleStuff.twk"
          - "Stylish.twk"
          - "Debug.rtn"
          - "Generate.rtn"
          - "GroupActions.rtn"
        optional: true
      - path: ../../Groups/XML/WorkingOn
        group: Incant/Grammar
        buildPhase: none
        type: group
        optional: true

      # ── Support (Frame source — browse only, NOT compiled) ─────────
      - path: ../../../support/Frame
        group: Support/C++
        buildPhase: none
        includes:
          - "BaseEntry.C"
          - "BaseHash.C"
          - "Buffer.C"
          - "DispatchQ.C"
          - "DoubleLink.C"
          - "DoubleLinkList.C"
          - "OCroutines.mm"
          - "PLGset.C"
          - "SearchItem.C"
          - "SearchNode.C"
          - "SearchTree.C"
          - "Stak.C"
          - "Tape.C"
          - "TapeSegment.C"
        optional: true
      - path: ../../../support/Frame
        group: Support/Tawk
        buildPhase: none
        includes:
          - "BaseHash.twk"
          - "Buffer.twk"
          - "DispatchQ.twk"
          - "DoubleLink.rtn"
          - "DoubleLink.twk"
          - "DoubleLinkList.rtn"
          - "DoubleLinkList.twk"
          - "OCroutines.twk"
          - "PLGset.twk"
          - "SearchItem.twk"
          - "SearchNode.twk"
          - "SearchTree.twk"
          - "Stak.twk"
          - "StringRoutines.twk"
          - "Tape.twk"
          - "TapeSegment.twk"
        optional: true

      # ── Include (support externals + project markdown) ─────────────
      - path: ../../../support/Include
        group: Include
        buildPhase: none
        includes:
          - "BOT.ext"
          - "changes"
          - "db.ext"
          - "frame"
          - "globals"
          - "groups.ext"
          - "GUIexternals"
          - "IOSframe"
          - "jit"
          - "maps"
          - "OCframe"
          - "pdf.ext"
          - "plg.ext"
          - "tok.ext"
        optional: true
      - path: CLAUDE.md
        group: Include
        buildPhase: none
      - path: PLGrevision
        group: Include
        buildPhase: none
      - path: projectBible.md
        group: Include
        buildPhase: none

    settings:
      base:
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)"
          - "$(SRCROOT)/../../../support/Frame"
          - "$(SRCROOT)/../../../support/Maps"
          - "$(SRCROOT)/../../../support/KeyTable"
          - "$(SRCROOT)/../../../support/Include"
        WARNING_CFLAGS:
          - "-Wno-parentheses"
          - "-Wno-write-strings"
        OTHER_CFLAGS:
          - "-Wno-parentheses"
          - "-Wno-write-strings"
