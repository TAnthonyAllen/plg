name: plg
options:
  bundleIdPrefix: com.taa.plg
  deploymentTarget:
    macOS: "12.0"

# .C is the tawk-emitted C++ extension. xcodegen would otherwise classify
# it as a Resource — force it to compile as C++.
fileTypes:
  C:
    buildPhase: sources
    lastKnownFileType: sourcecode.cpp.cpp

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
    CLANG_CXX_LIBRARY: "libc++"
    GCC_C_LANGUAGE_STANDARD: "gnu11"

# Three navigator groups: Sources / Headers / TAWK
# Each path entry sits one level under one of those groups.
# `name:` overrides the auto-name from the path basename where needed.
targets:
  plg:
    type: tool
    platform: macOS
    sources:
      # ── Sources (.C) ─────────────────────────────────────────────────
      - path: .
        name: plg
        group: Sources
        buildPhase: sources
        includes: ["*.C"]
      - path: ../../../support/Frame
        group: Sources
        buildPhase: sources
        includes: ["*.C"]
        excludes: ["BeforeRefactor"]
      - path: ../../../support/Maps
        group: Sources
        buildPhase: sources
        includes: ["*.C"]
      - path: ../../../support/KeyTable
        group: Sources
        buildPhase: sources
        includes: ["*.C"]

      # ── Headers (.h) ─────────────────────────────────────────────────
      - path: .
        name: plg
        group: Headers
        buildPhase: none
        includes: ["*.h"]
      - path: ../../../support/Frame
        group: Headers
        buildPhase: none
        includes: ["*.h"]
        excludes: ["BeforeRefactor"]
      - path: ../../../support/Maps
        group: Headers
        buildPhase: none
        includes: ["*.h"]
      - path: ../../../support/KeyTable
        group: Headers
        buildPhase: none
        includes: ["*.h"]

      # ── TAWK source (.twk + PLGrevision) ─────────────────────────────
      - path: .
        name: plg
        group: TAWK
        buildPhase: none
        includes: ["*.twk", "PLGrevision"]
      - path: ../../../support/Frame
        group: TAWK
        buildPhase: none
        includes: ["*.twk"]
        excludes: ["BeforeRefactor"]
      - path: ../../../support/Maps
        group: TAWK
        buildPhase: none
        includes: ["*.twk"]
      - path: ../../../support/KeyTable
        group: TAWK
        buildPhase: none
        includes: ["*.twk"]

    settings:
      base:
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)"
          - "$(SRCROOT)/.."
          - "$(SRCROOT)/../../../support/Frame"
          - "$(SRCROOT)/../../../support/Maps"
          - "$(SRCROOT)/../../../support/KeyTable"
          - "$(SRCROOT)/../../../support/Include"
        WARNING_CFLAGS:
          - "-Wno-parentheses"
          - "-Wno-write-strings"
        OTHER_CFLAGS:
          - "-Wno-parentheses"
          - "-Wno-write-strings"
