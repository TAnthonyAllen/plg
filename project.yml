name: plg
options:
  bundleIdPrefix: com.taa.plg
  deploymentTarget:
    macOS: "12.0"

# .C is the tawk-emitted C++ extension. xcodegen would otherwise classify
# it as a Resource — force it to compile as C++.
fileTypes:
  C:
    buildPhase: sources
    lastKnownFileType: sourcecode.cpp.cpp

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
    CLANG_CXX_LIBRARY: "libc++"
    GCC_C_LANGUAGE_STANDARD: "gnu11"

# Pull in the support project so we can depend on (and link against) its
# static library target.
projectReferences:
  Support:
    path: ../../../support/support.xcodeproj

targets:
  plg:
    type: tool
    platform: macOS
    sources:
      # ── Sources (.C) — plg's own files only ──────────────────────────
      - path: .
        name: plg
        group: Sources
        buildPhase: sources
        includes: ["*.C"]

      # ── Headers (.h) — plg's own files only ─────────────────────────
      - path: .
        name: plg
        group: Headers
        buildPhase: none
        includes: ["*.h"]

      # ── TAWK source — plg's own files only ──────────────────────────
      - path: .
        name: plg
        group: TAWK
        buildPhase: none
        includes: ["*.twk", "PLGrevision"]

    # Build/link against support.a from the support project.
    dependencies:
      - target: Support/support

    settings:
      base:
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)"
          - "$(SRCROOT)/../../../support/Frame"
          - "$(SRCROOT)/../../../support/Maps"
          - "$(SRCROOT)/../../../support/KeyTable"
          - "$(SRCROOT)/../../../support/Include"
        WARNING_CFLAGS:
          - "-Wno-parentheses"
          - "-Wno-write-strings"
        OTHER_CFLAGS:
          - "-Wno-parentheses"
          - "-Wno-write-strings"
